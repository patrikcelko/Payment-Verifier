<div class="auth-overlay" id="auth-overlay">
    <div class="auth-card">
        <div class="auth-header">
            <img src="/static/assets/images/logo.png" alt="Logo" class="auth-logo">
            <div class="auth-header-text">
                <h1><span class="accent">Payment</span> Verifier</h1>
                <p class="auth-subtitle">Protect your revenue, verify every payment.</p>
            </div>
        </div>

        <div class="auth-tabs">
            <button class="auth-tab active" onclick="switchAuthTab('login')">Login</button>
            <button class="auth-tab" onclick="switchAuthTab('register')">Create Account</button>
        </div>

        <div class="auth-tab-content active" id="auth-tab-login">
            <form onsubmit="handleLogin(event)">
                <label for="login-email">Email</label>
                <input type="email" id="login-email" placeholder="admin@example.com" required autocomplete="email">

                <label for="login-password">Password</label>
                <input type="password" id="login-password" placeholder="Enter password" required
                    autocomplete="current-password">

                <div id="login-error" class="auth-error" style="display:none"></div>

                <div class="auth-form-spacer"></div>
                <button type="submit" class="btn btn-full">Login</button>
            </form>
        </div>

        <div class="auth-tab-content" id="auth-tab-register" style="display:none">
            <form onsubmit="handleRegister(event)">
                <label for="register-name">Name</label>
                <input type="text" id="register-name" placeholder="Your name" required autocomplete="name">

                <label for="register-email">Email</label>
                <input type="email" id="register-email" placeholder="admin@example.com" required autocomplete="email">

                <label for="register-password">Password</label>
                <input type="password" id="register-password" placeholder="Min 8 characters" required
                    autocomplete="new-password" minlength="8" oninput="checkRegisterPasswordStrength()">

                <div id="register-password-strength" class="password-strength-wrap" style="display:none">
                    <div class="strength-bars">
                        <div class="strength-bar" id="register-strength-bar-1"></div>
                        <div class="strength-bar" id="register-strength-bar-2"></div>
                        <div class="strength-bar" id="register-strength-bar-3"></div>
                        <div class="strength-bar" id="register-strength-bar-4"></div>
                    </div>
                    <div id="register-strength-text" class="strength-text"></div>
                    <ul class="password-requirements">
                        <li id="register-req-length">At least 8 characters</li>
                        <li id="register-req-uppercase">At least one uppercase letter</li>
                        <li id="register-req-lowercase">At least one lowercase letter</li>
                        <li id="register-req-number">At least one number</li>
                    </ul>
                </div>

                <label for="register-password-confirm">Confirm Password</label>
                <input type="password" id="register-password-confirm" placeholder="Confirm your password" required
                    autocomplete="new-password" minlength="8" oninput="checkRegisterPasswordMatch()">
                <div id="register-password-match-error" class="password-match-error">Passwords do not match</div>

                <div id="register-error" class="auth-error" style="display:none"></div>

                <div class="auth-form-spacer"></div>
                <button type="submit" class="btn btn-full">Create Account</button>
            </form>
        </div>

        <div class="auth-footer">
            <div class="footer-copy">&copy; 2025&ndash;<span class="copy-year"></span> Payment Verifier v{{ version }}
            </div>
            <div class="auth-footer-github">
                Check this project on &nbsp;
                <a href="https://github.com/patrikcelko/Payment-Verifier" target="_blank" rel="noopener">
                    <img src="/static/assets/icons/github.svg" class="svg-icon" width="13" height="13" alt="">
                    GitHub
                </a>
            </div>
        </div>
    </div>
</div>
