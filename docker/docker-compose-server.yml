services:
  db:
    image: postgres:17-alpine
    container_name: payment-verifier-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - payment-verifier-pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 10

  payment-verifier:
    image: harbor.celko.cz/payment-verifier/payment-verifier:${ENV_NAME}
    container_name: payment-verifier
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_URL_SYNC: ${DATABASE_URL_SYNC}
      SECRET_KEY: ${SECRET_KEY}
    ports:
      - "${PV_PORT}:8111"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8111/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  payment-verifier-pgdata:
